<!-- fichier pages.tmpl --> 
<html>
<head> 
  <p><a href="{% url 'main' %}"> Accueil </a></p>

  <title>Les pages consultées</title>
  <style>   
    table.mon_tableau  {
        border-collapse: collapse;
    }
    table.mon_tableau td {
       border: 1px solid #5555;
       padding: 0.3em;
       font-family: "Sans-serif";
       font-size: 12px;
    }
    table.mon_tableau tr:nth-child(even)  {background: #EEE}
    table.mon_tableau tr:nth-child(odd) {background: #FFF}
  </style>
</head>

<body> 
<h1>Bien immobiliers</h1>
{% if rien %}
  Aucune entrée dans la table Bien_Immobiliers
{% else %}
  <table class="mon_tableau">
    <tr>
      <th>ID Bien</th>
      <th>Ville</th>
      <th>État</th>
      <th>Estimation</th>
    </tr>
  {% for p in pages %}
    <tr>
      <td>{{ p.id_bien }} </td>
      <td>{{ p.ville }} </td>
      <td>{{ p.etat }} </td>
      <td>{{ p.estimation }} </td>

    </tr>
   {% endfor %}
  </table>
{% endif %}
</body>
</html>
